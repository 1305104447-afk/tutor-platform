<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学生家教平台</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }

.navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,.15); position: sticky; top: 0; z-index: 1000; }
.navbar h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
.navbar .nav-btns { display: flex; gap: 10px; }
.navbar .nav-btns button { padding: 8px 18px; border: 2px solid rgba(255,255,255,.6); border-radius: 20px; background: transparent; color: white; cursor: pointer; font-size: 14px; transition: .2s; }
.navbar .nav-btns button:hover, .navbar .nav-btns button.active { background: rgba(255,255,255,.2); border-color: white; }

.container { max-width: 1300px; margin: 0 auto; padding: 20px; }
.panel { display: none; }
.panel.active { display: block; }

.home-hero { text-align: center; padding: 80px 20px 50px; }
.home-hero h2 { font-size: 32px; color: #667eea; margin-bottom: 12px; }
.home-hero p { font-size: 16px; color: #666; max-width: 500px; margin: 0 auto 40px; line-height: 1.6; }
.entry-cards { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
.entry-card { background: white; border-radius: 16px; padding: 40px 30px; width: 280px; text-align: center; cursor: pointer; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
.entry-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,.14); }
.entry-card .icon { font-size: 56px; margin-bottom: 16px; }
.entry-card h3 { font-size: 20px; margin-bottom: 8px; }
.entry-card p { font-size: 14px; color: #888; }
.entry-card.parent { border-top: 4px solid #f59e0b; }
.entry-card.student { border-top: 4px solid #3b82f6; }

.form-section { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.form-section h3 { font-size: 18px; margin-bottom: 16px; color: #667eea; }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 180px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
.form-row textarea { resize: vertical; min-height: 80px; }
.form-row label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #555; white-space: nowrap; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; transition: .2s; }
.btn-primary { background: #667eea; color: white; }
.btn-primary:hover { background: #5a6fd6; }
.btn-warning { background: #f59e0b; color: white; }
.btn-warning:hover { background: #d97706; }
.btn-danger { background: #ef4444; color: white; }
.btn-danger:hover { background: #dc2626; }

.map-container { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px; }
.map-box { height: 450px; border-radius: 8px; z-index: 1; }

.list-section { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.list-section h3 { font-size: 18px; margin-bottom: 16px; color: #667eea; }
.card-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.info-card { border: 1px solid #eee; border-radius: 10px; padding: 16px; transition: .2s; }
.info-card:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,.15); }
.info-card h4 { font-size: 16px; margin-bottom: 6px; color: #333; }
.info-card .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin: 3px 3px 3px 0; }
.tag-subject { background: #dbeafe; color: #1d4ed8; }
.tag-grade { background: #fef3c7; color: #92400e; }
.tag-gender { background: #fce7f3; color: #be185d; }
.tag-price { background: #d1fae5; color: #065f46; }
.info-card .detail { font-size: 13px; color: #666; margin-top: 6px; line-height: 1.5; }
.info-card .time { font-size: 12px; color: #aaa; margin-top: 8px; }
.info-card .actions { margin-top: 10px; display: flex; gap: 8px; }
.empty { text-align: center; color: #aaa; padding: 40px; font-size: 15px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 2000; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 14px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; color: #667eea; }
.modal .info-row { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.modal .info-row strong { color: #555; display: inline-block; width: 80px; }
.modal .close-btn { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }

.location-hint { font-size: 13px; color: #888; margin-top: 6px; }
.location-hint span { color: #667eea; font-weight: 600; }

@media (max-width: 768px) {
  .entry-cards { flex-direction: column; align-items: center; }
  .entry-card { width: 90%; }
  .form-row { flex-direction: column; }
  .form-row input, .form-row select { min-width: auto; }
}
</style>
</head>
<body>

<nav class="navbar">
  <h1>📚 大学生家教平台</h1>
  <div class="nav-btns">
    <button id="navHome" class="active" onclick="switchPanel('home')">🏠 首页</button>
    <button id="navParent" onclick="switchPanel('parent')">👨‍👩‍👧 家长入口</button>
    <button id="navStudent" onclick="switchPanel('student')">🎓 学生入口</button>
  </div>
</nav>

<div class="container">

  <!-- ═══ 首页 ═══ -->
  <div id="panelHome" class="panel active">
    <div class="home-hero">
      <h2>找到最合适的大学生家教</h2>
      <p>基于真实地理位置，让家长和学生在地图上相互发现。<br>1公里精度——保护隐私的同时精准匹配。</p>
      <div class="entry-cards">
        <div class="entry-card parent" onclick="switchPanel('parent')">
          <div class="icon">👨‍👩‍👧</div>
          <h3>我是家长</h3>
          <p>发布家教需求，在地图上寻找附近的大学生家教</p>
        </div>
        <div class="entry-card student" onclick="switchPanel('student')">
          <div class="icon">🎓</div>
          <h3>我是学生</h3>
          <p>填写个人资料，让附近家长在地图上发现你</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 家长端 ═══ -->
  <div id="panelParent" class="panel">
    <div class="form-section">
      <h3>📝 发布家教需求</h3>
      <div class="form-row">
        <input type="text" id="pName" placeholder="您的称呼">
        <input type="text" id="pPhone" placeholder="联系电话">
      </div>
      <div class="form-row">
        <select id="pSubject"><option value="">选择科目</option><option>数学</option><option>英语</option><option>语文</option><option>物理</option><option>化学</option><option>生物</option><option>历史</option><option>地理</option><option>编程</option><option>其他</option></select>
        <select id="pGrade"><option value="">选择年级</option><option>小学</option><option>初中</option><option>高中</option><option>大学</option></select>
        <input type="text" id="pPrice" placeholder="预算（元/小时）">
      </div>
      <div class="form-row">
        <textarea id="pNote" placeholder="补充说明（如上课时间、孩子情况等）"></textarea>
      </div>
      <div class="form-row">
        <label>📍 点击地图选择您的大致位置（1km精度，不会暴露精确地址）</label>
      </div>
      <div class="location-hint">已选位置：<span id="pLocation">尚未选择</span></div>
      <div style="margin-top:12px">
        <button class="btn btn-warning" onclick="publishParent()">✅ 发布需求</button>
      </div>
    </div>
    <div class="map-container"><div id="mapParent" class="map-box"></div></div>
    <div class="list-section">
      <h3>🎓 附近的大学生家教</h3>
      <div class="card-list" id="studentList"></div>
    </div>
  </div>

  <!-- ═══ 学生端 ═══ -->
  <div id="panelStudent" class="panel">
    <div class="form-section">
      <h3>📝 填写个人资料</h3>
      <div class="form-row">
        <input type="text" id="sName" placeholder="你的姓名">
        <input type="text" id="sPhone" placeholder="联系电话">
      </div>
      <div class="form-row">
        <input type="text" id="sSchool" placeholder="所在大学">
        <input type="text" id="sMajor" placeholder="专业">
      </div>
      <div class="form-row">
        <select id="sSubject"><option value="">擅长科目</option><option>数学</option><option>英语</option><option>语文</option><option>物理</option><option>化学</option><option>生物</option><option>历史</option><option>地理</option><option>编程</option><option>其他</option></select>
        <select id="sGrade"><option value="">可教年级</option><option>小学</option><option>初中</option><option>高中</option></select>
        <input type="text" id="sPrice" placeholder="期望时薪（元/小时）">
      </div>
      <div class="form-row">
        <select id="sGender"><option value="">性别</option><option>男</option><option>女</option></select>
        <input type="text" id="sAge" placeholder="年龄">
      </div>
      <div class="form-row">
        <textarea id="sBio" placeholder="自我介绍（教学经验、获奖情况等）"></textarea>
      </div>
      <div class="form-row">
        <label>📍 点击地图选择你的大致位置（1km精度）</label>
      </div>
      <div class="location-hint">已选位置：<span id="sLocation">尚未选择</span></div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" onclick="publishStudent()">✅ 发布资料</button>
      </div>
    </div>
    <div class="map-container"><div id="mapStudent" class="map-box"></div></div>
    <div class="list-section">
      <h3>👨‍👩‍👧 附近的家教需求</h3>
      <div class="card-list" id="parentList"></div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════
//         数据存储
// ═══════════════════════════
const STORAGE_KEY = 'tutor_platform_data';
let appData = { parents: [], students: [] };

function loadData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) appData = JSON.parse(raw); }
  catch(e) { appData = { parents: [], students: [] }; }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
loadData();

// ═══════════════════════════
//         地图管理
// ═══════════════════════════
let map = null, markersLayer = null;
let pendingLat = null, pendingLng = null;
let currentPanel = 'home';

function destroyMap() {
  if (map) { map.remove(); map = null; markersLayer = null; }
}

function createMap(divId) {
  destroyMap();

  const defaultCenter = [39.9042, 116.4074];
  map = L.map(divId, { center: defaultCenter, zoom: 14, zoomControl: true });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  L.control.scale({ metric: true, imperial: false, maxWidth: 160, position: 'bottomleft' }).addTo(map);

  markersLayer = L.layerGroup().addTo(map);

  map.on('click', function(e) {
    pendingLat = e.latlng.lat;
    pendingLng = e.latlng.lng;
    updateLocationDisplay();
    refreshMarkers();
    L.circleMarker([pendingLat, pendingLng], {
      radius: 10, color: '#10b981', fillColor: '#34d399',
      fillOpacity: 0.7, weight: 3
    }).addTo(markersLayer).bindPopup('📍 您选择的位置（即将发布）').openPopup();
  });

  refreshMarkers();
}

function updateLocationDisplay() {
  if (pendingLat == null || pendingLng == null) return;
  const text = pendingLat.toFixed(4) + ', ' + pendingLng.toFixed(4);
  var pEl = document.getElementById('pLocation');
  var sEl = document.getElementById('sLocation');
  if (pEl) pEl.textContent = text;
  if (sEl) sEl.textContent = text;
}

function refreshMarkers() {
  if (!markersLayer) return;
  markersLayer.eachLayer(function(layer) {
    if (layer._isDataMarker) markersLayer.removeLayer(layer);
  });

  appData.students.forEach(function(s) {
    var m = L.circleMarker([s.lat, s.lng], {
      radius: 9, color: '#2563eb', fillColor: '#3b82f6',
      fillOpacity: 0.85, weight: 2.5
    }).addTo(markersLayer);
    m._isDataMarker = true;
    m.bindPopup('<b>🎓 ' + escapeHtml(s.name) + '</b><br>' + escapeHtml(s.school) + ' · ' + escapeHtml(s.subject) + '<br>💰 ' + s.price + '元/小时');
  });

  appData.parents.forEach(function(p) {
    var m = L.circleMarker([p.lat, p.lng], {
      radius: 9, color: '#d97706', fillColor: '#f59e0b',
      fillOpacity: 0.85, weight: 2.5
    }).addTo(markersLayer);
    m._isDataMarker = true;
    m.bindPopup('<b>👨‍👩‍👧 ' + escapeHtml(p.name) + '</b><br>' + escapeHtml(p.subject) + ' · ' + escapeHtml(p.grade) + '<br>💰 ' + p.price + '元/小时');
  });
}

// ═══════════════════════════
//         面板切换
// ═══════════════════════════
function switchPanel(panel) {
  currentPanel = panel;
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-btns button').forEach(function(b) { b.classList.remove('active'); });

  var panelMap = { home: 'panelHome', parent: 'panelParent', student: 'panelStudent' };
  var btnMap = { home: 'navHome', parent: 'navParent', student: 'navStudent' };

  document.getElementById(panelMap[panel]).classList.add('active');
  document.getElementById(btnMap[panel]).classList.add('active');

  if (panel === 'parent') {
    createMap('mapParent');
    renderLists();
  } else if (panel === 'student') {
    createMap('mapStudent');
    renderLists();
  } else {
    destroyMap();
  }
}

// ═══════════════════════════
//         发布
// ═══════════════════════════
function publishParent() {
  var name = document.getElementById('pName').value.trim();
  var phone = document.getElementById('pPhone').value.trim();
  var subject = document.getElementById('pSubject').value;
  var grade = document.getElementById('pGrade').value;
  var price = document.getElementById('pPrice').value.trim();
  var note = document.getElementById('pNote').value.trim();

  if (!name || !phone || !subject || !grade || !price) {
    alert('请填写所有必填字段（称呼、电话、科目、年级、预算）');
    return;
  }
  if (pendingLat == null || pendingLng == null) {
    alert('请在地图上点击选择您的大致位置');
    return;
  }

  appData.parents.push({
    id: Date.now(), type: 'parent',
    name: name, phone: phone, subject: subject, grade: grade, price: price, note: note,
    lat: pendingLat, lng: pendingLng,
    time: new Date().toLocaleString('zh-CN')
  });

  saveData();
  refreshMarkers();
  renderLists();
  clearParentForm();
  alert('需求发布成功！');
}

function publishStudent() {
  var name = document.getElementById('sName').value.trim();
  var phone = document.getElementById('sPhone').value.trim();
  var school = document.getElementById('sSchool').value.trim();
  var major = document.getElementById('sMajor').value.trim();
  var subject = document.getElementById('sSubject').value;
  var grade = document.getElementById('sGrade').value;
  var price = document.getElementById('sPrice').value.trim();
  var gender = document.getElementById('sGender').value;
  var age = document.getElementById('sAge').value.trim();
  var bio = document.getElementById('sBio').value.trim();

  if (!name || !phone || !school || !subject || !grade || !price) {
    alert('请填写所有必填字段（姓名、电话、大学、科目、可教年级、期望时薪）');
    return;
  }
  if (pendingLat == null || pendingLng == null) {
    alert('请在地图上点击选择你的大致位置');
    return;
  }

  appData.students.push({
    id: Date.now(), type: 'student',
    name: name, phone: phone, school: school, major: major,
    subject: subject, grade: grade, price: price,
    gender: gender, age: age, bio: bio,
    lat: pendingLat, lng: pendingLng,
    time: new Date().toLocaleString('zh-CN')
  });

  saveData();
  refreshMarkers();
  renderLists();
  clearStudentForm();
  alert('资料发布成功！');
}

function clearParentForm() {
  ['pName','pPhone','pSubject','pGrade','pPrice','pNote'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
}

function clearStudentForm() {
  ['sName','sPhone','sSchool','sMajor','sSubject','sGrade','sPrice','sGender','sAge','sBio'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
}

// ═══════════════════════════
//         列表渲染
// ═══════════════════════════
function renderLists() {
  var studentList = document.getElementById('studentList');
  if (studentList) {
    if (appData.students.length === 0) {
      studentList.innerHTML = '<div class="empty">暂无大学生家教信息</div>';
    } else {
      studentList.innerHTML = appData.students.map(function(s) {
        return '<div class="info-card">' +
          '<h4>🎓 ' + escapeHtml(s.name) + ' <span class="tag tag-gender">' + (s.gender||'未知') + '</span></h4>' +
          '<div>' +
            '<span class="tag tag-subject">' + escapeHtml(s.subject) + '</span> ' +
            '<span class="tag tag-grade">' + escapeHtml(s.grade) + '</span> ' +
            '<span class="tag tag-price">' + s.price + '元/时</span>' +
          '</div>' +
          '<div class="detail">🏫 ' + escapeHtml(s.school) + ' · ' + escapeHtml(s.major||'') + ' · ' + (s.age||'') + '岁</div>' +
          '<div class="detail">📞 ' + escapeHtml(s.phone) + '</div>' +
          '<div class="detail">' + escapeHtml(s.bio||'') + '</div>' +
          '<div class="time">📍 (' + s.lat.toFixed(2) + ', ' + s.lng.toFixed(2) + ') · ' + s.time + '</div>' +
          '<div class="actions">' +
            '<button class="btn btn-primary" style="padding:5px 14px;font-size:12px" onclick="focusMarker(' + s.lat + ',' + s.lng + ')">📍 在地图查看</button> ' +
            '<button class="btn btn-danger" style="padding:5px 14px;font-size:12px" onclick="deleteItem(\'students\',' + s.id + ')">🗑 删除</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  }

  var parentList = document.getElementById('parentList');
  if (parentList) {
    if (appData.parents.length === 0) {
      parentList.innerHTML = '<div class="empty">暂无家教需求</div>';
    } else {
      parentList.innerHTML = appData.parents.map(function(p) {
        return '<div class="info-card">' +
          '<h4>👨‍👩‍👧 ' + escapeHtml(p.name) + '</h4>' +
          '<div>' +
            '<span class="tag tag-subject">' + escapeHtml(p.subject) + '</span> ' +
            '<span class="tag tag-grade">' + escapeHtml(p.grade) + '</span> ' +
            '<span class="tag tag-price">' + p.price + '元/时</span>' +
          '</div>' +
          '<div class="detail">📞 ' + escapeHtml(p.phone) + '</div>' +
          '<div class="detail">' + escapeHtml(p.note||'') + '</div>' +
          '<div class="time">📍 (' + p.lat.toFixed(2) + ', ' + p.lng.toFixed(2) + ') · ' + p.time + '</div>' +
          '<div class="actions">' +
            '<button class="btn btn-primary" style="padding:5px 14px;font-size:12px" onclick="focusMarker(' + p.lat + ',' + p.lng + ')">📍 在地图查看</button> ' +
            '<button class="btn btn-danger" style="padding:5px 14px;font-size:12px" onclick="deleteItem(\'parents\',' + p.id + ')">🗑 删除</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  }
}

function focusMarker(lat, lng) {
  if (!map) return;
  map.setView([lat, lng], 16);
  markersLayer.eachLayer(function(layer) {
    if (layer.getLatLng && layer.getLatLng().lat === lat && layer.getLatLng().lng === lng) {
      layer.openPopup();
    }
  });
}

function deleteItem(type, id) {
  if (!confirm('确定删除这条信息吗？')) return;
  if (type === 'parents') {
    appData.parents = appData.parents.filter(function(p) { return p.id !== id; });
  } else {
    appData.students = appData.students.filter(function(s) { return s.id !== id; });
  }
  saveData();
  refreshMarkers();
  renderLists();
}

// ═══════════════════════════
//         弹窗
// ═══════════════════════════
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('show');
});
</script>
</body>
</html>
